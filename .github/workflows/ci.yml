name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

# Newer pushes to the same ref cancel in-flight runs.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The required gate: keep this fast. Mark this job's check required in
  # branch protection so PRs can't merge until it's green.
  test:
    name: typecheck · unit · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  # Real-engine proof of the library's premise (setProperty ⇄ var()/calc()).
  # Runs on every PR for visibility but is intentionally NOT a required check:
  # it installs browsers and is slower. Don't add it to branch protection.
  e2e:
    name: e2e
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps ${{ matrix.browser }}
      - run: npx playwright test --project=${{ matrix.browser }}
