name: Release

# Version-driven publishing. On a push to main (or a manual run), this publishes
# to npm + cuts a GitHub Release **only when** package.json's version isn't already
# on npm. So the normal flow is: bump package.json + add a CHANGELOG section,
# commit, push to main — and routine commits (no version change) are a clean no-op.
# No need to tag by hand; this creates the tag (and respects one you already made).
# Manual-only for now — run from the Actions tab once the repo is public (npm
# provenance requires a public source repo). To resume auto-publishing on a
# library version bump, uncomment the `push` trigger below.
on:
  workflow_dispatch: # "Run workflow" button in the Actions tab
  # push:
  #   branches: [main]
  #   # Only the library itself can produce a release — never docs/ or demos/.
  #   paths:
  #     - 'src/**'
  #     - 'tsup.config.ts'
  #     - 'tsconfig.json'
  #     - 'package.json'

permissions:
  contents: write # push the tag + create the GitHub Release
  id-token: write # npm provenance attestation

concurrency:
  group: release # serialize releases; never publish two runs at once
  cancel-in-progress: false

jobs:
  release:
    name: publish on version bump
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags, so we can tag and detect existing tags
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org # needed for NODE_AUTH_TOKEN
          cache: npm

      # Is package.json's version already on npm? If so, there's nothing to release.
      - name: Is this version new?
        id: check
        run: |
          NAME="$(node -p "require('./package.json').name")"
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "$NAME@$VERSION is already published — nothing to do."
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            echo "$NAME@$VERSION is new — releasing."
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi

      # ---- everything below runs only for a new version ----

      - name: Verify CHANGELOG has this version
        if: steps.check.outputs.release == 'true'
        run: |
          VERSION="${{ steps.check.outputs.version }}"
          if ! grep -q "^## \[$VERSION\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no '## [$VERSION]' section"
            exit 1
          fi

      - name: Install
        if: steps.check.outputs.release == 'true'
        run: npm ci

      - name: Typecheck · unit · build
        if: steps.check.outputs.release == 'true'
        run: |
          npm run typecheck
          npm test
          npm run build

      - name: Extract release notes
        if: steps.check.outputs.release == 'true'
        run: |
          awk -v ver="${{ steps.check.outputs.version }}" '
            $0 ~ "^## \\[" ver "\\]" { f = 1; next }
            /^## \[/ && f { f = 0 }
            f { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          echo "----- release notes -----"; cat RELEASE_NOTES.md

      - name: Publish to npm
        if: steps.check.outputs.release == 'true'
        # access: public + provenance come from package.json "publishConfig"
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Tag + GitHub Release
        if: steps.check.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.check.outputs.version }}"
          TAG="v$VERSION"
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "$TAG"
            git push origin "$TAG"
          fi
          gh release view "$TAG" >/dev/null 2>&1 \
            || gh release create "$TAG" --title "$TAG" --notes-file RELEASE_NOTES.md
